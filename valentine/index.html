<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Special Valentine ❤️</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="valentine.css">

</head>

<body>
    <div class="container">
        <!-- Floating Hearts Background -->
        <div class="hearts-bg" id="hearts-bg"></div>

        <!-- Section 0: Name Input -->
        <div id="name-input" class="screen active">
            <div class="input-box">
                <h2>Who is this beautiful person? <br>❤️</h2>
                <input type="text" id="valentine-name" placeholder="Enter your name..." autocomplete="off">
                <button class="btn btn-yes" onclick="submitName()">Continue</button>
            </div>
        </div>

        <!-- Section 1: Entrance (Envelope) -->
        <div id="entrance" class="screen">
            <div class="envelope-container" id="open-envelope">
                <div class="envelope">
                    <div class="envelope-flap"></div>
                    <div class="envelope-body"></div>
                    <div class="envelope-letter">
                        <p>For You ❤️</p>
                    </div>
                </div>
                <p class="click-instruction">Tap to open...</p>
            </div>
        </div>

        <!-- Section 2: Questions -->
        <div id="questions" class="screen">
            <div class="question-box">
                <h2 id="question-text">Are you ready for a surprise?</h2>
                <div class="options">
                    <button class="btn btn-yes" onclick="nextQuestion()">Yes!</button>
                    <button class="btn btn-no" onclick="handleNo()">No</button>
                </div>
            </div>
        </div>

        <!-- Section 3: The Proposal -->
        <div id="proposal" class="screen">
            <div class="proposal-box">
                <div class="gif-container">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExajN4c2c1c3l5N2w0d2c4c3l5c3l5c3l5c3l5c3l5c3l5/26FLdmIp6wJr91JAI/giphy.gif"
                        alt="Cute Bear" class="cute-gif">
                </div>
                <h1>Will you be my Valentine? 🌹</h1>
                <p>You make my world brighter every single day.</p>
                <div class="options proposal-options">
                    <button class="btn btn-yes" id="yes-btn" onclick="acceptProposal()">YES! ❤️</button>
                    <button class="btn btn-no" id="no-btn" onmouseover="moveButton()">No 😢</button>
                </div>
            </div>
        </div>

        <!-- Section 4: Celebration -->
        <div id="celebration" class="screen">
            <div class="celebration-content">
                <h1>Yay! I love you so much! ❤️❤️❤️</h1>
                <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="Happy Cat"
                    class="celebration-gif">
                <p>Get ready for our special date! 🥂</p>
                <button class="btn btn-restart" onclick="location.reload()">Replay ❤️</button>
            </div>
        </div>
    </div>

    <!-- Audio (Optional) -->
    <!-- <audio id="bg-music" src="bg-music.mp3" loop></audio> -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="valentine.js"></script>
</body>

</html>
